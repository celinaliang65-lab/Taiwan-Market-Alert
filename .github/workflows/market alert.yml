name: Taiwan Market Alert

on:
  schedule:
    # 台灣時間 09:30 = UTC 01:30
    - cron: "30 1 * * 1-5"
    # 台灣時間 10:30 = UTC 02:30
    - cron: "30 2 * * 1-5"
    # 台灣時間 11:30 = UTC 03:30
    - cron: "30 3 * * 1-5"
    # 台灣時間 12:30 = UTC 04:30
    - cron: "30 4 * * 1-5"
  workflow_dispatch:  # 支援手動觸發（測試用）

jobs:
  alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Market Alert
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          LINE_USER_ID_1: ${{ secrets.LINE_USER_ID_1 }}
          LINE_USER_ID_2: ${{ secrets.LINE_USER_ID_2 }}
          LINE_USER_ID_3: ${{ secrets.LINE_USER_ID_3 }}
          LINE_USER_ID_4: ${{ secrets.LINE_USER_ID_4 }}
          LINE_USER_ID_5: ${{ secrets.LINE_USER_ID_5 }}
        run: python market_alert.py
